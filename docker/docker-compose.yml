version: '3.8'

services:
  db:
    image: postgres:14
    container_name: crm-postgres
    restart: always
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: saas_crm
    ports:
      - "5432:5432"
    volumes:
      - crm-db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: crm-redis
    restart: always
    ports:
      - "6379:6379"

  evolution-api:
    image: atendimentodigital/evolution-api:latest
    container_name: evolution-api
    restart: always
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_RESTART_POLICY=always
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://crm_user:crm_password@db:5432/saas_crm?schema=public
      - DATABASE_TYPE=postgres
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=422470222470222470
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - db
      - redis

volumes:
  crm-db-data:
  evolution_instances:
